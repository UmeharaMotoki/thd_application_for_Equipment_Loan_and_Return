services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: thd
      POSTGRES_PASSWORD: thd_dev_password
      POSTGRES_DB: thd
    ports:
      - "5432:5432"
    volumes:
      - thd_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thd -d thd"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  thd_pgdata:
